<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Диаризация — Softline</title>
<style>
  :root { --bg:#0f1420; --card:#172033; --input:#0e1626; --muted:#8aa0c0; --fg:#e7eefc; --acc:#4f8cff; --line:#26324a; }
  body.light { --bg:#f3f5f9; --card:#ffffff; --input:#f0f3fa; --muted:#5a6b86; --fg:#13203a; --acc:#2f6bff; --line:#e0e6f0; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 -apple-system,Segoe UI,Roboto,Arial,sans-serif; transition:background .2s,color .2s; }
  .wrap { max-width:920px; margin:0 auto; padding:24px 16px 64px; }
  .head { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  h1 { font-size:22px; margin:8px 0 4px; }
  .sub { color:var(--muted); margin:0 0 20px; font-size:13px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:16px; }
  label { display:block; font-size:13px; color:var(--muted); margin:0 0 6px; }
  input[type=text], input[type=password], input[type=text], select, .spk input {
    width:100%; padding:10px 12px; background:var(--input); color:var(--fg);
    border:1px solid var(--line); border-radius:8px; font-size:14px; }
  input[type=file] { width:100%; color:var(--muted); }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:160px; }
  .opts { display:flex; gap:18px 22px; flex-wrap:wrap; margin-top:6px; }
  .opt { display:flex; align-items:center; gap:7px; color:var(--fg); font-size:14px; }
  .opt input { width:16px; height:16px; accent-color:var(--acc); }
  button { background:var(--acc); color:#fff; border:0; padding:11px 20px; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--fg); font-weight:500; padding:9px 14px; font-size:14px; }
  button.icon { background:transparent; border:1px solid var(--line); color:var(--fg); padding:8px 12px; font-size:18px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .status { margin:14px 0 0; color:var(--muted); font-size:14px; }
  .err { color:#ff7a7a; }
  .sec h2 { font-size:15px; margin:0 0 8px; color:var(--acc); border-bottom:1px solid var(--line); padding-bottom:6px; }
  pre.transcript { white-space:pre-wrap; word-break:break-word; max-height:420px; overflow:auto;
    background:var(--input); border:1px solid var(--line); border-radius:8px; padding:12px; font-size:13px; margin:0; }
  .md ul { list-style:none; margin:6px 0; padding-left:0; }
  .md ul ul { padding-left:18px; }                 /* вложенные подпункты — отступ вправо */
  .md li { position:relative; padding-left:16px; margin:3px 0; }
  .md li::before { content:"-"; position:absolute; left:2px; color:var(--muted); }
  .md p { margin:6px 0; }
  /* Саммари: у заголовков верхнего уровня маркера нет (подпункты — с «-») */
  .md.sum > ul > li { padding-left:0; }
  .md.sum > ul > li::before { content:none; }
  /* Follow-up: нумерация */
  .md.fu ol { list-style:decimal; margin:6px 0; padding-left:26px; }
  .md.fu li { padding-left:0; margin:4px 0; }
  .md.fu li::before { content:none; }
  /* To-do: таблица */
  table.todo { width:100%; border-collapse:collapse; font-size:14px; }
  table.todo th, table.todo td { border:1px solid var(--line); padding:7px 10px; text-align:left; vertical-align:top; }
  table.todo th { color:var(--acc); background:var(--input); font-weight:600; }
  table.todo td.num { text-align:center; color:var(--muted); width:46px; }
  .hint { font-size:12px; color:var(--muted); margin-top:6px; }
  .bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .spk { display:flex; gap:12px; flex-wrap:wrap; }
  .spk > div { flex:1; min-width:170px; }
  .spk label { font-family:ui-monospace,Consolas,monospace; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>🎙️ Диаризация совещаний и звонков</h1>
      <p class="sub">Загрузите аудио/видео — транскрипт «кто и когда», саммари, follow-up и to-do.</p>
    </div>
    <div class="bar">
      <a href="/logout" class="ghost" style="text-decoration:none">Выйти</a>
      <button class="icon" id="themeBtn" title="Сменить тему">☀️</button>
    </div>
  </div>

  <div class="card">
    <div style="margin-bottom:14px">
      <label>Файл (mp3, wav, m4a, mp4 …)</label>
      <input type="file" id="file" accept="audio/*,video/*">
    </div>

    <div class="row" style="margin-bottom:12px">
      <div>
        <label>Режим</label>
        <select id="mode">
          <option value="auto">auto — определить автоматически</option>
          <option value="mono">mono — совещание (pyannote)</option>
          <option value="stereo">stereo — звонок (по каналам)</option>
        </select>
      </div>
      <div>
        <label>ASR-модель</label>
        <select id="model">
          <option value="gigaam">gigaam (рус.)</option>
          <option value="parakeet">parakeet</option>
        </select>
      </div>
    </div>

    <label>Постобработка</label>
    <div class="opts">
      <label class="opt"><input type="checkbox" id="merge_speakers" checked> слить реплики спикера</label>
      <label class="opt"><input type="checkbox" id="timestamps" checked> тайм-коды</label>
      <label class="opt"><input type="checkbox" id="summary"> саммари</label>
      <label class="opt"><input type="checkbox" id="follow_up"> follow-up</label>
      <label class="opt"><input type="checkbox" id="todo"> to-do</label>
    </div>

    <div class="bar" style="margin-top:18px">
      <button id="go">Обработать</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div id="result"></div>
</div>

<script>
const $ = id => document.getElementById(id);

// --- тема ---
function setTheme(t){ document.body.classList.toggle('light', t==='light'); localStorage.setItem('diar_theme', t); $('themeBtn').textContent = t==='light' ? '🌙' : '☀️'; }
setTheme(localStorage.getItem('diar_theme') || 'dark');
$('themeBtn').onclick = () => setTheme(document.body.classList.contains('light') ? 'dark' : 'light');

let RES = null;     // ответ сервера
let MAP = {};       // SPEAKER_xx -> имя
let showTs = true;  // показывать тайм-коды в выводе

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function md(s, listTag){
  // Вложенные списки (отступ 2 пробела = уровень) + абзацы. listTag: 'ul' (по умолч.) или 'ol'.
  const T = listTag || 'ul';
  const open = '<'+T+'>', closeli = '</li></'+T+'>';
  const lines = esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').split('\n');
  let html=''; const stack=[];
  for(const ln of lines){
    const m = ln.match(/^(\s*)[-•*]\s+(.*)$/);
    if(m){
      const indent = m[1].replace(/\t/g,'  ').length;
      if(stack.length===0){ html+=open; stack.push(indent); }
      else {
        while(stack.length>1 && indent < stack[stack.length-1]){ html+=closeli; stack.pop(); }
        if(indent > stack[stack.length-1]){ html+=open; stack.push(indent); }
        else { html+='</li>'; }
      }
      html+='<li>'+m[2];
    } else {
      while(stack.length){ html+=closeli; stack.pop(); }
      if(ln.trim()) html+='<p>'+ln+'</p>';
    }
  }
  while(stack.length){ html+=closeli; stack.pop(); }
  return html;
}
function section(title, inner, cls){ return '<div class="card sec"><h2>'+title+'</h2><div class="'+(cls||'md')+'">'+inner+'</div></div>'; }
function boldify(t){ return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }

// To-do: распарсить Markdown-таблицу -> строки данных [Задача, Ответственный, Срок]
function parseTodo(s){
  const lines = String(s||'').split('\n').map(l => l.trim()).filter(l => l.indexOf('|') >= 0);
  let rows = lines.map(l => l.replace(/^\|/,'').replace(/\|$/,'').split('|').map(c => c.trim()))
                  .filter(c => !c.every(x => /^[-:\s]*$/.test(x)));   // выкинуть строку-разделитель |---|
  if(rows.length > 1 && /задач|ответствен|срок/i.test(rows[0].join(' '))) rows = rows.slice(1);
  return rows;
}
function renderTodo(s){
  const rows = parseTodo(s);
  if(!rows.length) return '<div class="md">'+md(s)+'</div>';   // не таблица -> как было
  const cell = t => boldify(esc(t||''));
  let h = '<table class="todo"><thead><tr><th>№</th><th>Задача</th><th>Ответственный</th><th>Срок</th></tr></thead><tbody>';
  rows.forEach((c,i) => { h += '<tr><td class="num">'+(i+1)+'</td><td>'+cell(c[0])+'</td><td>'+cell(c[1]||'—')+'</td><td>'+cell(c[2]||'—')+'</td></tr>'; });
  return h + '</tbody></table>';
}
// Нумерация bullet-строк для txt (Follow-up)
function followupTxt(s){
  let n=0;
  return String(s||'').split('\n').map(l => { const m=l.match(/^(\s*)[-•*]\s+(.*)$/); if(m){ n++; return m[1]+n+'. '+m[2]; } return l; }).join('\n');
}
// To-do для txt: № + колонки через ' — '
function todoTxt(s){
  const rows=parseTodo(s); if(!rows.length) return s;
  return rows.map((c,i) => (i+1)+'. '+(c[0]||'')+' — '+(c[1]||'—')+' — '+(c[2]||'—')).join('\n');
}

function speakers(){ return [...new Set((RES.segments||[]).map(s=>s.speaker))]; }
function nameOf(sp){ return MAP[sp] || sp; }
function applyMap(text){ let t=String(text||''); for(const sp of speakers()){ if(MAP[sp]) t=t.split(sp).join(MAP[sp]); } return t; }
function mmss(x){ const s=Math.floor(x||0); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function transcript(withTs){
  return (RES.segments||[]).map(u=>{
    const p = withTs ? '['+mmss(u.start)+'-'+mmss(u.end)+'] ' : '';
    return p + nameOf(u.speaker) + ': ' + u.text;
  }).join('\n');
}

function buildTxt(){
  const parts = [];
  if(RES.summary)   parts.push('===== САММАРИ =====\n' + applyMap(RES.summary));
  if(RES.follow_up) parts.push('===== FOLLOW-UP =====\n' + followupTxt(applyMap(RES.follow_up)));
  if(RES.todo)      parts.push('===== TO-DO =====\n' + todoTxt(applyMap(RES.todo)));
  parts.push('===== ТРАНСКРИПТ =====\n' + transcript(showTs));   // диаризация — после секций
  return parts.join('\n\n');
}
function buildJson(){
  const o = {};
  for(const k of ['summary','follow_up','todo']) if(RES[k]) o[k] = applyMap(RES[k]);
  o.segments = (RES.segments||[]).map(u => ({...u, speaker: nameOf(u.speaker)}));
  o.text = transcript(true);
  return JSON.stringify(o, null, 2);
}
function buildHtml(){
  let body = '';
  if(RES.summary)   body += '<h2>Саммари</h2><div class="sum">'+md(applyMap(RES.summary),'ul')+'</div>';
  if(RES.follow_up) body += '<h2>Follow-up</h2><div class="fu">'+md(applyMap(RES.follow_up),'ol')+'</div>';
  if(RES.todo)      body += '<h2>To-do</h2>'+renderTodo(applyMap(RES.todo));
  body += '<h2>Транскрипт</h2><pre class="tr">'+esc(transcript(showTs))+'</pre>';
  const css = 'body{font:15px/1.6 -apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#111;max-width:820px;margin:24px auto;padding:0 16px}'
    +'h2{color:#1a5fd0;border-bottom:1px solid #ddd;padding-bottom:5px;margin-top:28px}'
    +'ul{list-style:none;padding-left:0}ul ul{padding-left:18px}'
    +'li{position:relative;padding-left:16px;margin:3px 0}li::before{content:"-";position:absolute;left:2px;color:#888}'
    +'.sum>ul>li{padding-left:0}.sum>ul>li::before{content:none}'
    +'.fu ol{padding-left:26px;list-style:decimal}.fu li{padding-left:0;margin:4px 0}.fu li::before{content:none}'
    +'table{border-collapse:collapse;width:100%;font-size:14px}th,td{border:1px solid #ccc;padding:7px 10px;text-align:left;vertical-align:top}th{background:#f0f3fa}'
    +'pre.tr{white-space:pre-wrap;word-break:break-word;background:#f7f8fa;border:1px solid #e0e0e0;border-radius:6px;padding:12px;font-size:13px}';
  return '<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>Диаризация</title><style>'+css+'</style></head><body>'+body+'</body></html>';
}
async function downloadDocx(){
  const data = { timestamps: showTs, segments: (RES.segments||[]).map(u => ({...u, speaker: nameOf(u.speaker)})) };
  for(const k of ['summary','follow_up','todo']) if(RES[k]) data[k] = applyMap(RES[k]);
  try {
    const r = await fetch('/v1/export/docx', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if(!r.ok){ alert('Ошибка экспорта DOCX: '+r.status); return; }
    const blob = await r.blob();
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'diarization.docx'; a.click(); URL.revokeObjectURL(a.href);
  } catch(e){ alert('Сбой экспорта DOCX: '+e); }
}
function download(name, content, type){
  const b = new Blob([content], {type}); const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = name; a.click(); URL.revokeObjectURL(a.href);
}

function render(){
  let html = '';
  const sp = speakers();
  if(sp.length){
    html += '<div class="card sec"><h2>🧑 Спикеры — назначьте имена</h2><div class="spk">';
    for(const s of sp) html += '<div><label>'+esc(s)+'</label><input data-sp="'+esc(s)+'" value="'+esc(MAP[s]||'')+'" placeholder="имя / роль"></div>';
    html += '</div><div class="bar" style="margin-top:12px">'
          + '<button id="applyNames">Применить имена</button>'
          + '<label class="opt"><input type="checkbox" id="tsDisp"'+(showTs?' checked':'')+'> тайм-коды</label>'
          + '<button class="ghost" id="dlTxt">⬇ .txt</button>'
          + '<button class="ghost" id="dlHtml">⬇ .html</button>'
          + '<button class="ghost" id="dlDocx">⬇ .docx</button>'
          + '<button class="ghost" id="dlJson">⬇ .json</button></div></div>';
  }
  if(RES.summary)   html += section('📋 Саммари', md(applyMap(RES.summary), 'ul'), 'md sum');
  if(RES.follow_up) html += section('🔎 Follow-up', md(applyMap(RES.follow_up), 'ol'), 'md fu');
  if(RES.todo)      html += section('✅ To-do', renderTodo(applyMap(RES.todo)), 'tdwrap');
  html += '<div class="card sec"><h2>📝 Транскрипт</h2><pre class="transcript">'+esc(transcript(showTs))+'</pre></div>';
  $('result').innerHTML = html;

  const an = $('applyNames');
  if(an) an.onclick = () => {
    document.querySelectorAll('[data-sp]').forEach(i => { const v=i.value.trim(); if(v) MAP[i.dataset.sp]=v; else delete MAP[i.dataset.sp]; });
    render();
  };
  const td = $('tsDisp'); if(td) td.onchange = () => { showTs = td.checked; render(); };
  const dt = $('dlTxt'); if(dt) dt.onclick = () => download('diarization.txt', buildTxt(), 'text/plain;charset=utf-8');
  const dh = $('dlHtml'); if(dh) dh.onclick = () => download('diarization.html', buildHtml(), 'text/html;charset=utf-8');
  const dx = $('dlDocx'); if(dx) dx.onclick = downloadDocx;
  const dj = $('dlJson'); if(dj) dj.onclick = () => download('diarization.json', buildJson(), 'application/json');
}

let timer = null;
$('go').onclick = async () => {
  const file = $('file').files[0];
  if(!file){ $('status').innerHTML = '<span class="err">Выберите файл</span>'; return; }
  showTs = $('timestamps').checked;
  MAP = {};

  const fd = new FormData();
  fd.append('file', file);
  fd.append('mode', $('mode').value);
  fd.append('model', $('model').value);
  for(const k of ['merge_speakers','timestamps','summary','follow_up','todo'])
    fd.append(k, $(k).checked ? 'true' : 'false');
  fd.append('response_format', 'json');

  $('go').disabled = true; $('result').innerHTML = '';
  const t0 = Date.now();
  timer = setInterval(() => { $('status').textContent = 'Обработка… ' + Math.round((Date.now()-t0)/1000) + ' с'; }, 500);

  try {
    const r = await fetch('/v1/diarize', { method:'POST', body: fd });  // сессия в cookie
    clearInterval(timer);
    if(!r.ok){
      let d=''; try{ d=(await r.json()).detail; }catch(e){ d=r.statusText; }
      $('status').innerHTML = '<span class="err">Ошибка '+r.status+': '+esc(d)+'</span>';
      $('go').disabled=false; return;
    }
    RES = await r.json();
    $('status').textContent = 'Готово за ' + Math.round((Date.now()-t0)/1000) + ' с · реплик: ' + (RES.segments?.length||0);
    render();
  } catch(e){
    clearInterval(timer);
    $('status').innerHTML = '<span class="err">Сбой запроса: '+esc(e)+'</span>';
  }
  $('go').disabled = false;
};
</script>
</body>
</html>
